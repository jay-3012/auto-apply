
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  .aa-root {
    font-family: 'Inter', sans-serif;
    min-height: 600px;
    background: #060a12;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    border-radius: 16px;
  }
  .aa-glow-1 {
    position: absolute;
    top: -10%;
    left: -5%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    animation: pulseglow 4s ease-in-out infinite;
  }
  .aa-glow-2 {
    position: absolute;
    bottom: -10%;
    right: -5%;
    width: 480px;
    height: 480px;
    background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    animation: pulseglow 4s ease-in-out infinite;
    animation-delay: 2.5s;
  }
  .aa-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  @keyframes pulseglow {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  @keyframes fadeup {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .aa-main {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 400px;
    padding: 2.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeup 0.5s ease-out both;
  }
  .aa-logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2rem;
    text-align: center;
  }
  .aa-logo-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.1rem;
    box-shadow: 0 0 28px rgba(99,102,241,0.35);
  }
  .aa-logo-icon svg {
    width: 22px;
    height: 22px;
    color: white;
  }
  .aa-title {
    font-size: 28px;
    font-weight: 900;
    color: #f8fafc;
    letter-spacing: -0.03em;
    margin: 0 0 6px;
  }
  .aa-title span {
    background: linear-gradient(90deg, #818cf8, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .aa-subtitle {
    font-size: 12.5px;
    color: #64748b;
    font-weight: 500;
    margin: 0;
    line-height: 1.5;
  }
  .aa-card {
    width: 100%;
    background: rgba(10,15,28,0.82);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 28px 28px 24px;
    position: relative;
    overflow: hidden;
  }
  .aa-card-shine {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    pointer-events: none;
  }
  .aa-field {
    margin-bottom: 18px;
  }
  .aa-label {
    display: block;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 7px;
    margin-left: 2px;
  }
  .aa-input-wrap {
    position: relative;
  }
  .aa-input-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    width: 17px;
    height: 17px;
    color: #4f4f6e;
    pointer-events: none;
    transition: color 0.2s;
  }
  .aa-input {
    width: 100%;
    box-sizing: border-box;
    background: rgba(4,8,18,0.7);
    border: 1px solid rgba(255,255,255,0.06);
    color: #e2e8f0;
    padding: 11px 14px 11px 40px;
    font-size: 13.5px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    border-radius: 11px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .aa-input::placeholder { color: #2d3348; }
  .aa-input:focus {
    border-color: rgba(99,102,241,0.5);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
  }
  .aa-input:focus + .aa-input-icon,
  .aa-input-wrap:focus-within .aa-input-icon {
    color: #818cf8;
  }
  .aa-forgot-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 7px;
    margin-left: 2px;
    margin-right: 2px;
  }
  .aa-forgot {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #6366f1;
    text-decoration: none;
    transition: color 0.2s;
  }
  .aa-forgot:hover { color: #a5b4fc; }
  .aa-btn {
    width: 100%;
    margin-top: 8px;
    padding: 13px 20px;
    background: linear-gradient(90deg, #6366f1 0%, #7c3aed 100%);
    border: none;
    border-radius: 11px;
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 6px 20px -4px rgba(99,102,241,0.45);
    transition: box-shadow 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .aa-btn:hover {
    box-shadow: 0 8px 28px -4px rgba(99,102,241,0.6);
  }
  .aa-btn:active { transform: scale(0.98); }
  .aa-btn-shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0s;
  }
  .aa-btn:hover .aa-btn-shimmer {
    transform: translateX(100%);
    transition: transform 0.6s ease;
  }
  .aa-btn svg {
    width: 15px;
    height: 15px;
    transition: transform 0.2s;
  }
  .aa-btn:hover svg { transform: translateX(3px); }
  .aa-divider {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .aa-access-label {
    font-size: 8.5px;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: #334155;
  }
  .aa-cred-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(4,8,18,0.8);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 7px;
    padding: 5px 10px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .aa-cred-pill:hover { background: rgba(4,8,18,1); }
  .aa-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #34d399;
    box-shadow: 0 0 8px rgba(52,211,153,0.8);
    animation: pulseglow 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  .aa-cred-text {
    font-size: 11px;
    font-family: 'Courier New', monospace;
    font-weight: 600;
    color: #34d399;
    letter-spacing: 0.02em;
  }
  .aa-footer {
    margin-top: 22px;
    font-size: 11.5px;
    color: rgba(100,116,139,0.6);
    font-weight: 500;
    text-align: center;
  }
  .aa-footer span { color: rgba(99,102,241,0.7); margin: 0 5px; }
</style>

<div class="aa-root">
  <div class="aa-glow-1"></div>
  <div class="aa-glow-2"></div>
  <div class="aa-grid"></div>

  <main class="aa-main">
    <div class="aa-logo-wrap">
      <div class="aa-logo-icon">
        <svg fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24" style="color:white;width:22px;height:22px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/>
        </svg>
      </div>
      <h1 class="aa-title">AutoApply<span>.</span></h1>
      <p class="aa-subtitle">The intelligent pipeline for modern engineering roles.</p>
    </div>

    <div class="aa-card">
      <div class="aa-card-shine"></div>

      <div class="aa-field">
        <label class="aa-label">Username</label>
        <div class="aa-input-wrap">
          <input type="text" class="aa-input" placeholder="Enter your system identifier" />
          <svg class="aa-input-icon" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
          </svg>
        </div>
      </div>

      <div class="aa-field" style="margin-bottom:4px;">
        <div class="aa-forgot-row">
          <label class="aa-label" style="margin:0;">Password</label>
          <a href="#" class="aa-forgot">Forgot?</a>
        </div>
        <div class="aa-input-wrap" style="margin-top:7px;">
          <input type="password" class="aa-input" placeholder="••••••••" style="letter-spacing:0.12em;" />
          <svg class="aa-input-icon" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
          </svg>
        </div>
      </div>

      <button class="aa-btn" style="margin-top:18px;">
        <div class="aa-btn-shimmer"></div>
        <span style="position:relative;z-index:1;">Initialize Pipeline</span>
        <svg style="position:relative;z-index:1;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
        </svg>
      </button>

      <div class="aa-divider">
        <span class="aa-access-label">System Access</span>
        <div class="aa-cred-pill">
          <div class="aa-dot"></div>
          <code class="aa-cred-text">admin : password</code>
        </div>
      </div>
    </div>

    <footer class="aa-footer">
      Engineered with precision <span>&middot;</span> &copy; 2026
    </footer>
  </main>
</div>
